<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF转图片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            opacity: 0.9;
        }
        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
        .flash-messages {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }
        .flash-messages li {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .flash-success {
            background: #d4edda;
            color: #155724;
        }
        .flash-error {
            background: #f8d7da;
            color: #721c24;
        }
        .upload-form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #e91e63;
            background: #fce4ec;
        }
        .drop-zone p {
            color: #666;
            margin-top: 10px;
        }
        .drop-zone input[type="file"] {
            display: none;
        }
        .btn-upload {
            display: inline-block;
            background: #e91e63;
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        .btn-upload:hover {
            background: #c2185b;
        }
        .btn-upload:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            width: 0%;
            transition: width 0.3s;
        }
        #selected-file-name {
            margin-top: 10px;
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/index" class="back-link">&larr; 返回首页</a>
        <h1>PDF转图片</h1>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul class="flash-messages">
            {% for message in messages %}
            <li class="flash-{{ 'success' if '成功' in message else 'error' }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <div class="upload-form">
            <form id="uploadForm" action="/upload/pdf" method="POST" enctype="multipart/form-data">
                <div class="drop-zone" id="dropZone">
                    <svg width="50" height="50" fill="none" stroke="#999" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                    <p>拖拽PDF文件到此处，或点击选择文件</p>
                    <p style="font-size: 12px; color: #999;">每页转换为一张200 DPI的JPG图片</p>
                    <input type="file" name="file" id="fileInput" accept=".pdf">
                    <div id="selected-file-name"></div>
                    <button type="submit" class="btn-upload" id="uploadBtn" disabled>转换并上传</button>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const selectedFileName = document.getElementById('selected-file-name');
        const uploadForm = document.getElementById('uploadForm');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        dropZone.addEventListener('click', (e) => {
            if (e.target !== uploadBtn) {
                fileInput.click();
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                selectedFileName.textContent = fileInput.files[0].name;
                uploadBtn.disabled = false;
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                selectedFileName.textContent = e.dataTransfer.files[0].name;
                uploadBtn.disabled = false;
            }
        });

        uploadForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const formData = new FormData(uploadForm);
            const xhr = new XMLHttpRequest();

            progressBar.style.display = 'block';
            uploadBtn.disabled = true;
            uploadBtn.textContent = '转换中...';

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressFill.style.width = percent + '%';
                }
            });

            xhr.addEventListener('load', () => {
                if (xhr.status === 302 || xhr.status === 200) {
                    window.location.reload();
                } else {
                    alert('上传失败');
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '转换并上传';
                    progressBar.style.display = 'none';
                }
            });

            xhr.addEventListener('error', () => {
                alert('上传出错');
                uploadBtn.disabled = false;
                uploadBtn.textContent = '转换并上传';
                progressBar.style.display = 'none';
            });

            xhr.open('POST', '/upload/pdf');
            xhr.send(formData);
        });
    </script>
</body>
</html>
