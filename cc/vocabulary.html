        let remainingWords = [];
        let currentWord = null;
        let learnedCount = 0;

        function init() {
            const saved = localStorage.getItem('vocabularyProgress');
            if (saved) {
                const data = JSON.parse(saved);
                learnedCount = data.learnedCount || 0;
                const learnedWords = data.learnedWords || [];
                
                remainingWords = words.filter(w => !learnedWords.includes(w.english));
            } else {
                remainingWords = [...words];
            }
            
            updateStats();
            showNextWord();
        }

        function updateStats() {
            const total = words.length;
            const remaining = remainingWords.length;
            const learned = total - remaining;
            
            document.getElementById('totalWords').textContent = total;
            document.getElementById('remainingWords').textContent = remaining;
            document.getElementById('learnedWords').textContent = learned;
            
            const progress = (learned / total) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `进度: ${learned} / ${total}`;
        }

        function showNextWord() {
            if (remainingWords.length === 0) {
                showCompleted();
                return;
            }
            
            const randomIndex = Math.floor(Math.random() * remainingWords.length);
            currentWord = remainingWords[randomIndex];
            
            document.getElementById('word').textContent = currentWord.english;
            document.getElementById('translation').textContent = currentWord.chinese;
            document.getElementById('translation').classList.remove('visible');
            document.getElementById('hint').textContent = '点击单词或按钮显示中文翻译';
            document.getElementById('hint').style.display = 'block';
        }

        function showTranslation() {
            if (currentWord) {
                document.getElementById('translation').classList.add('visible');
                document.getElementById('hint').style.display = 'none';
            }
        }

        function markLearned() {
            if (!currentWord) return;
            
            const index = remainingWords.indexOf(currentWord);
            if (index > -1) {
                remainingWords.splice(index, 1);
                learnedCount++;
                saveProgress();
                updateStats();
            }
            
            showNextWord();
        }

        function nextWord() {
            showNextWord();
        }

        function saveProgress() {
            const learnedWords = words
                .filter(w => !remainingWords.includes(w))
                .map(w => w.english);
            
            localStorage.setItem('vocabularyProgress', JSON.stringify({
                learnedWords: learnedWords,
                learnedCount: learnedCount
            }));
        }

        function resetProgress() {
            if (confirm('确定要重置学习进度吗？所有已学会的单词将被重新开始学习。')) {
                localStorage.removeItem('vocabularyProgress');
                remainingWords = [...words];
                learnedCount = 0;
                updateStats();
                showNextWord();
            }
        }

        function showCompleted() {
            const card = document.getElementById('wordCard');
            card.innerHTML = `
                <div class="completed">
                    <div class="celebration">🎉</div>
                    <h2>恭喜完成！</h2>
                    <p>你已经学会了所有 ${words.length} 个单词！</p>
                    <button class="btn btn-reset" onclick="resetProgress()">重新学习</button>
                </div>
            `;
            document.getElementById('buttons').style.display = 'none';
            document.getElementById('hint').style.display = 'none';
        }

        init();
    </script>
