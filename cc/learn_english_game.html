<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun English Learning Game for Kids</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            color: #4ecdc4;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .game-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
            margin: 30px 0;
        }
        
        .images-section, .words-section {
            flex: 1;
            min-width: 300px;
        }
        
        .image-item, .word-item {
            display: inline-block;
            margin: 10px;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }
        
        .image-item {
            background-color: #ffeaa7;
            border: 3px solid #fdcb6e;
        }
        
        .word-item {
            background-color: #74b9ff;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            border: 3px solid #0984e3;
        }
        
        .image-item:hover, .word-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .selected {
            background-color: #00b894 !important;
            border-color: #00a085 !important;
            color: white !important;
        }
        
        .match {
            animation: matchAnimation 0.5s ease;
        }
        
        @keyframes matchAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .score-board {
            background-color: #e17055;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.3em;
            margin: 20px 0;
        }
        
        .feedback {
            height: 50px;
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
            color: #2d3436;
        }
        
        .success {
            color: #00b894;
        }
        
        .error {
            color: #d63031;
        }
        
        button {
            background-color: #00b894;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            font-family: inherit;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #00a085;
        }
        
        img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        
        .instructions {
            background-color: #f1c40f;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        
        .instructions h3 {
            margin-top: 0;
            color: #2d3436;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 Fun English Game! 🌟</h1>
        <p class="subtitle">Match the pictures with the words!</p>
        
        <div class="instructions">
            <h3>How to Play:</h3>
            <ol>
                <li>Click on a picture</li>
                <li>Then click on the matching word</li>
                <li>If they match, they will disappear!</li>
                <li>Try to match all pictures with words!</li>
            </ol>
        </div>
        
        <div class="score-board">
            Score: <span id="score">0</span> | Matches: <span id="matches">0</span>/<span id="total-matches">6</span>
        </div>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="game-area">
            <div class="images-section">
                <h2>Pictures</h2>
                <div id="images-container"></div>
            </div>
            
            <div class="words-section">
                <h2>Words</h2>
                <div id="words-container"></div>
            </div>
        </div>
        
        <button onclick="resetGame()">Reset Game</button>
        <button onclick="newGame()">New Game</button>
    </div>

    <script>
        // Word-image pairs for the game
        const wordImagePairs = [
            { word: "Apple", image: "🍎", id: "apple" },
            { word: "Cat", image: "🐱", id: "cat" },
            { word: "Dog", image: "🐶", id: "dog" },
            { word: "Ball", image: "⚽", id: "ball" },
            { word: "Book", image: "📚", id: "book" },
            { word: "Car", image: "🚗", id: "car" }
        ];
        
        let score = 0;
        let matches = 0;
        let selectedImage = null;
        let selectedWord = null;
        let gamePairs = [];
        
        // Initialize the game
        function initGame() {
            gamePairs = [...wordImagePairs];
            shuffleArray(gamePairs);
            renderGame();
        }
        
        // Shuffle array using Fisher-Yates algorithm
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        // Render the game elements
        function renderGame() {
            const imagesContainer = document.getElementById('images-container');
            const wordsContainer = document.getElementById('words-container');
            
            imagesContainer.innerHTML = '';
            wordsContainer.innerHTML = '';
            
            gamePairs.forEach((pair, index) => {
                // Create image element
                const imageDiv = document.createElement('div');
                imageDiv.className = 'image-item';
                imageDiv.id = `img-${pair.id}`;
                imageDiv.onclick = () => selectImage(pair, imageDiv);
                
                const imgElement = document.createElement('div');
                imgElement.textContent = pair.image;
                imgElement.style.fontSize = '3em';
                
                imageDiv.appendChild(imgElement);
                imagesContainer.appendChild(imageDiv);
                
                // Create word element
                const wordDiv = document.createElement('div');
                wordDiv.className = 'word-item';
                wordDiv.id = `word-${pair.id}`;
                wordDiv.onclick = () => selectWord(pair, wordDiv);
                
                wordDiv.textContent = pair.word;
                wordsContainer.appendChild(wordDiv);
            });
            
            updateScore();
        }
        
        // Handle image selection
        function selectImage(pair, element) {
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedImage = null;
            } else {
                // Deselect previous selection
                if (selectedImage) {
                    selectedImage.element.classList.remove('selected');
                }
                
                element.classList.add('selected');
                selectedImage = { pair, element };
                
                // Check if both are selected
                if (selectedWord) {
                    checkMatch();
                }
            }
        }
        
        // Handle word selection
        function selectWord(pair, element) {
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedWord = null;
            } else {
                // Deselect previous selection
                if (selectedWord) {
                    selectedWord.element.classList.remove('selected');
                }
                
                element.classList.add('selected');
                selectedWord = { pair, element };
                
                // Check if both are selected
                if (selectedImage) {
                    checkMatch();
                }
            }
        }
        
        // Check if the selected image and word match
        function checkMatch() {
            if (!selectedImage || !selectedWord) return;
            
            const feedback = document.getElementById('feedback');
            
            if (selectedImage.pair.id === selectedWord.pair.id) {
                // Correct match
                feedback.textContent = "Great job! 🎉 Correct match!";
                feedback.className = "feedback success";
                
                // Add match animation and hide matched items
                selectedImage.element.classList.add('match');
                selectedWord.element.classList.add('match');
                
                setTimeout(() => {
                    selectedImage.element.style.display = 'none';
                    selectedWord.element.style.display = 'none';
                    
                    score += 10;
                    matches++;
                    updateScore();
                    
                    // Check if game is completed
                    if (matches === gamePairs.length) {
                        setTimeout(() => {
                            alert(`Congratulations! You won the game! Final Score: ${score}`);
                        }, 500);
                    }
                }, 500);
            } else {
                // Wrong match
                feedback.textContent = "Oops! Try again! 😕";
                feedback.className = "feedback error";
                
                // Deselect after delay
                setTimeout(() => {
                    selectedImage.element.classList.remove('selected');
                    selectedWord.element.classList.remove('selected');
                    selectedImage = null;
                    selectedWord = null;
                }, 1000);
            }
            
            // Reset selections
            selectedImage = null;
            selectedWord = null;
        }
        
        // Update score display
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('matches').textContent = matches;
            document.getElementById('total-matches').textContent = gamePairs.length;
        }
        
        // Reset the current game
        function resetGame() {
            // Reset selections
            selectedImage = null;
            selectedWord = null;
            
            // Clear feedback
            document.getElementById('feedback').textContent = '';
            
            // Show all hidden elements
            document.querySelectorAll('.image-item, .word-item').forEach(el => {
                el.style.display = 'inline-block';
                el.classList.remove('selected', 'match');
            });
            
            // Reset game state
            score = 0;
            matches = 0;
            updateScore();
        }
        
        // Start a new game with shuffled items
        function newGame() {
            resetGame();
            initGame();
        }
        
        // Start the game when page loads
        window.onload = initGame;
    </script>
</body>
</html>
