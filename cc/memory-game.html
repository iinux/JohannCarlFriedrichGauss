<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字记忆游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: white;
            font-size: 18px;
        }

        .game-info span {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: transparent;
            cursor: pointer;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card-front {
            background: linear-gradient(145deg, #f0f0f0, #cacaca);
            color: #667eea;
        }

        .card-front::after {
            content: "?";
        }

        .card-back {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            color: #764ba2;
            transform: rotateY(180deg);
        }

        .card.matched .card-back {
            background: linear-gradient(145deg, #90EE90, #7FDD7F);
            color: white;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
        }

        .win-message.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .win-message h2 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .win-message p {
            color: #666;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 99;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>数字记忆游戏</h1>

    <div class="game-info">
        <span>步数: <strong id="moves">0</strong></span>
        <span>时间: <strong id="timer">00:00</strong></span>
        <span>匹配: <strong id="matches">0</strong>/8</span>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <button class="btn" onclick="restartGame()">重新开始</button>

    <div class="overlay" id="overlay"></div>
    <div class="win-message" id="winMessage">
        <h2>恭喜你赢了!</h2>
        <p>用时: <span id="finalTime">00:00</span></p>
        <p>步数: <span id="finalMoves">0</span></p>
        <button class="btn" onclick="restartGame()">再玩一次</button>
    </div>

    <script>
        // 游戏配置
        const CARD_COUNT = 8; // 8对卡片
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let startTime = null;
        let timerInterval = null;

        // 初始化游戏
        function initGame() {
            // 生成数字对
            const numbers = [];
            for (let i = 1; i <= CARD_COUNT; i++) {
                numbers.push(i, i);
            }

            // 洗牌
            shuffleArray(numbers);

            // 创建卡片
            cards = numbers.map((num, index) => ({
                id: index,
                number: num,
                flipped: false,
                matched: false
            }));

            renderBoard();
            resetStats();
        }

        // 洗牌算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 渲染游戏板
        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = `card ${card.flipped ? 'flipped' : ''} ${card.matched ? 'matched' : ''}`;
                cardElement.dataset.id = card.id;
                cardElement.onclick = () => flipCard(card.id);

                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back">${card.number}</div>
                    </div>
                `;

                board.appendChild(cardElement);
            });
        }

        // 翻牌
        function flipCard(cardId) {
            const card = cards[cardId];

            // 检查是否可以翻牌
            if (card.flipped || card.matched || flippedCards.length >= 2) {
                return;
            }

            // 开始计时
            if (!gameStarted) {
                startTimer();
                gameStarted = true;
            }

            // 翻牌
            card.flipped = true;
            flippedCards.push(card);
            renderBoard();

            // 检查是否翻了两张牌
            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        // 检查匹配
        function checkMatch() {
            const [card1, card2] = flippedCards;

            if (card1.number === card2.number) {
                // 匹配成功
                setTimeout(() => {
                    card1.matched = true;
                    card2.matched = true;
                    matchedPairs++;
                    flippedCards = [];
                    updateStats();
                    renderBoard();

                    // 检查是否全部匹配
                    if (matchedPairs === CARD_COUNT) {
                        endGame();
                    }
                }, 500);
            } else {
                // 匹配失败,翻回去
                setTimeout(() => {
                    card1.flipped = false;
                    card2.flipped = false;
                    flippedCards = [];
                    renderBoard();
                }, 1000);
            }
        }

        // 开始计时
        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        // 更新计时器
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${minutes}:${seconds}`;
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matchedPairs;
        }

        // 重置统计
        function resetStats() {
            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            gameStarted = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('timer').textContent = '00:00';
            updateStats();
        }

        // 游戏结束
        function endGame() {
            clearInterval(timerInterval);
            const finalTime = document.getElementById('timer').textContent;
            document.getElementById('finalTime').textContent = finalTime;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('winMessage').classList.add('show');
        }

        // 重新开始
        function restartGame() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('winMessage').classList.remove('show');
            initGame();
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
